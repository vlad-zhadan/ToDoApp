replicaCount: 2

image:
  repository: ecommerce-app
  tag: local
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

db:
  image: mcr.microsoft.com/mssql/server:2022-latest
  port: 1433
  name: ToDoApp
  user: sa
  password: Strong!Passw0rd
  acceptEula: "Y"

env:
  dbUseWindowsAuth: "false"
  corsOrigin: http://localhost:3000
